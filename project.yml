name: SwiftTunnel
options:
  bundleIdPrefix: com.swiftunnel
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
packages: {}
targets:
  SwiftTunnel:
    type: application
    platform: iOS
    sources:
      - path: App/Sources
    resources:
      - path: App/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.swiftunnel.app
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
    dependencies:
      - target: SwiftTunnelPacketTunnel
        embed: true
    entitlements:
      path: App/SwiftTunnel.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.swiftunnel.shared
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
  SwiftTunnelPacketTunnel:
    type: app-extension
    platform: iOS
    sources:
      - path: PacketTunnel/Sources
      - path: App/Sources/Shared
    resources:
      - path: PacketTunnel/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.swiftunnel.app.PacketTunnel
        INFOPLIST_FILE: PacketTunnel/Info.plist
        CODE_SIGN_STYLE: Automatic
        APPLICATION_EXTENSION_API_ONLY: YES
        OTHER_LDFLAGS:
          - -lresolv
    dependencies:
      - framework: Frameworks/Libbox.xcframework
      - sdk: UIKit.framework
      - sdk: SystemConfiguration.framework
    entitlements:
      path: PacketTunnel/PacketTunnel.entitlements
      properties:
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
        com.apple.security.application-groups:
          - group.com.swiftunnel.shared
