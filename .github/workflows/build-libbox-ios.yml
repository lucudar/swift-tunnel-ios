name: build-libbox-ios

on:
  workflow_dispatch:
    inputs:
      sing_box_ref:
        description: sing-box git ref
        required: true
        default: v1.13.14

jobs:
  build-libbox:
    name: Build Libbox.xcframework
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Checkout sing-box
        uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box
          ref: ${{ inputs.sing_box_ref }}
          path: sing-box
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: sing-box/go.mod

      - name: Build iOS Libbox
        working-directory: sing-box
        run: |
          go install -v github.com/sagernet/gomobile/cmd/gomobile@v0.1.13
          go install -v github.com/sagernet/gomobile/cmd/gobind@v0.1.13
          gomobile init
          go run ./cmd/internal/build_libbox -target apple -platform ios
          test -d Libbox.xcframework

      - name: Upload Libbox artifact
        uses: actions/upload-artifact@v4
        with:
          name: Libbox-ios-xcframework
          path: sing-box/Libbox.xcframework
          if-no-files-found: error
