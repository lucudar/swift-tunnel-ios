name: unsigned-ipa

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Install XcodeGen
        run: |
          brew update
          brew install xcodegen
          xcodegen --version

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned app
        run: |
          set -o pipefail
          mkdir -p build
          xcodebuild build \
            -project SwiftTunnel.xcodeproj \
            -scheme SwiftTunnel \
            -configuration Release \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            -derivedDataPath build/DerivedData \
            | tee build/xcodebuild-unsigned.log

      - name: Package unsigned IPA
        run: |
          APP_PATH="$(find build/DerivedData/Build/Products/Release-iphoneos -maxdepth 2 -name 'SwiftTunnel.app' -type d | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "SwiftTunnel.app not found"
            find build/DerivedData/Build/Products -maxdepth 4 -print || true
            exit 1
          fi
          python3 Scripts/package_unsigned_ipa.py \
            --app "$APP_PATH" \
            --output build/SwiftTunnel-unsigned.ipa \
            --overwrite

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SwiftTunnel-unsigned-ipa
          path: |
            build/SwiftTunnel-unsigned.ipa
            build/xcodebuild-unsigned.log
          if-no-files-found: error
